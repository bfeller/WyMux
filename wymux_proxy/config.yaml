name: "WyMux Proxy"
version: "1.1.1"
slug: "wymux_proxy"
description: "Wyoming proxy service for advanced intent routing, STT multiplexing, and speaker identification."
arch:
  - amd64
  - aarch64
  - armhf
  - armv7
init: false
hassio_api: true
hassio_role: default
homeassistant_api: true
map:
  - share:rw
options:
  stt_whisper_url: "tcp://core-whisper:10300"
  biometric_server_url: ""
  biometric_api_key: ""
  audio_storage_url: ""
  audio_storage_api_key: ""
  custom_llm_url: ""
  custom_llm_api_key: ""
  custom_llm_model: "gpt-3.5-turbo"
  debug_logging: false
schema:
  stt_whisper_url: str
  biometric_server_url: str?
  biometric_api_key: str?
  audio_storage_url: str?
  audio_storage_api_key: str?
  custom_llm_url: str?
  custom_llm_api_key: str?
  custom_llm_model: str?
  debug_logging: bool
ports:
  10400/tcp: 10400
