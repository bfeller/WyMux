name: "WyMux Proxy"
version: "1.0.8"
slug: "wymux_proxy"
description: "Wyoming proxy service for advanced intent routing, STT multiplexing, and speaker identification."
arch:
  - amd64
  - aarch64
  - armhf
  - armv7
init: false
hassio_api: true
hassio_role: default
homeassistant_api: true
map:
  - share:rw
options:
  stt_whisper_url: "tcp://core-whisper:10300"
  biometric_server_url: "http://localhost:8000/identify"
  audio_storage_url: "http://localhost:8080/upload"
  custom_llm_url: "https://api.openai.com/v1/chat/completions"
  custom_llm_api_key: ""
  custom_llm_model: "gpt-3.5-turbo"
schema:
  stt_whisper_url: str
  biometric_server_url: str
  audio_storage_url: str
  custom_llm_url: str
  custom_llm_api_key: str?
  custom_llm_model: str
ports:
  10400/tcp: 10400
